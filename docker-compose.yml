name: doodle-canvas

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: doodle-canvas:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      SERVE_FRONTEND: "true"
      FRONTEND_BASE: /
      FRONTEND_DIST_DIR: ../../dist
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"

      DB_HOST: "${DB_HOST:-host.docker.internal}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_NAME: "${DB_NAME:-canvas}"
      DB_USER: "${DB_USER:-canvas}"
      DB_PASS: "${DB_PASS:-canvas_password}"

      REDIS_HOST: "${REDIS_HOST:-host.docker.internal}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_PASS: "${REDIS_PASS:-}"
      AUTH_REDIS_FAILURE_MODE: "${AUTH_REDIS_FAILURE_MODE:-deny}"

      JWT_SECRET: "${JWT_SECRET:-change_me_doodle_canvas_jwt_secret_at_least_32_bytes}"
      AES_SECRET_KEY: "${AES_SECRET_KEY:-0123456789abcdef0123456789abcdef}"

      STORAGE_ROOT: /app/server/storage
      STORAGE_BASE_URL: /storage
      STORAGE_MAX_UPLOAD_BYTES: "${STORAGE_MAX_UPLOAD_BYTES:-20971520}"
      STORAGE_REMOTE_MAX_BYTES: "${STORAGE_REMOTE_MAX_BYTES:-104857600}"

      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_SECURE: "${SMTP_SECURE:-true}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      MAIL_FROM: "${MAIL_FROM:-Doodle-Canvas <noreply@example.com>}"

      REGISTER_GIFT_COINS: "${REGISTER_GIFT_COINS:-100}"
      DEFAULT_NEW_USER_BALANCE: "${DEFAULT_NEW_USER_BALANCE:-10.00}"
      DEFAULT_GENERATION_COST: "${DEFAULT_GENERATION_COST:-0}"
      DEFAULT_IMAGE_COST: "${DEFAULT_IMAGE_COST:-1}"
      DEFAULT_VIDEO_COST: "${DEFAULT_VIDEO_COST:-0}"
      DEFAULT_CHAT_COST: "${DEFAULT_CHAT_COST:-0}"
    volumes:
      - app_storage:/app/server/storage
      - app_logs:/app/server/logs

volumes:
  app_storage:
  app_logs:
