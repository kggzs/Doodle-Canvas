server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Handle /huobao-canvas path
    location /huobao-canvas {
        alias /usr/share/nginx/html/huobao-canvas;
        try_files $uri $uri/ /huobao-canvas/index.html;
    }

    # API proxy to backend | 后端 API 代理
    # OpenAI 兼容接口
    location /v1 {
        proxy_pass https://api.openai.com;
        proxy_set_header Host api.openai.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # 阿里云万相 DashScope 接口（对应 Vite dev 代理 /services -> /api/v1/services）
    location /services {
        proxy_pass https://dashscope.aliyuncs.com/api/v1/services;
        proxy_set_header Host dashscope.aliyuncs.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # 阿里云万相异步任务查询（对应 Vite dev 代理 /tasks -> /api/v1/tasks）
    location /tasks {
        proxy_pass https://dashscope.aliyuncs.com/api/v1/tasks;
        proxy_set_header Host dashscope.aliyuncs.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # 动态代理：通过 _target 参数指定真实目标地址
    # 请求示例: /proxy/v1/images/generations?_target=https://example.com
    location /proxy {
        resolver 8.8.8.8 114.114.114.114 valid=300s;

        # 使用 Lua 或 if 组合提取 _target，这里用变量拼接方式
        set $_target $arg__target;
        set $_real_uri $uri;

        # 安全检查：_target 必须以 https:// 或 http:// 开头
        if ($_target = "") {
            return 400 '{"error":"Missing _target parameter"}';
        }

        # 去掉 /proxy 前缀得到真实路径（保留 query 中的 _target 之外参数）
        rewrite ^/proxy(/.*)$ $1 break;

        # 设置代理目标（使用变量时 nginx 不会自动附加 URI，需手动拼接）
        proxy_pass $_target;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;

        # 支持流式响应（SSE）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
